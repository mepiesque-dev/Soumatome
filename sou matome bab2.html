<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sou Matome N3 — Bab 2 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Dela+Gothic+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --card: #1e1e2e;
    --accent: #f5c842;
    --accent2: #ff6b6b;
    --accent3: #6bffb8;
    --text: #f0eeff;
    --muted: #7a7a9a;
    --border: #2e2e42;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 80%, rgba(107,255,184,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* Header */
  header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: clamp(28px, 6vw, 48px);
    line-height: 1.1;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 24px 0;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    text-align: center;
    min-width: 90px;
  }

  .stat-value {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 24px;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Progress */
  .progress-wrap {
    background: var(--border);
    border-radius: 100px;
    height: 6px;
    margin: 0 0 32px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* Mode selector */
  .mode-wrap {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
  }

  .mode-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }

  .mode-btn.active {
    background: var(--accent);
    color: #000;
  }

  /* Category filter */
  .category-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .cat-btn {
    padding: 6px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .cat-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,200,66,0.08);
  }

  /* Quiz card */
  .quiz-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .quiz-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  .question-num {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .question-num .cat-tag {
    background: rgba(245,200,66,0.12);
    color: var(--accent);
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 11px;
  }

  .question-main {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 900;
    text-align: center;
    margin: 20px 0 32px;
    line-height: 1.3;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .question-sub {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    margin-top: -20px;
    margin-bottom: 24px;
  }

  /* Options grid */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .option-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'DM Sans', 'Noto Sans JP', sans-serif;
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
    position: relative;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(245,200,66,0.06);
    transform: translateY(-2px);
  }

  .option-btn.correct {
    border-color: var(--accent3) !important;
    background: rgba(107,255,184,0.1) !important;
    color: var(--accent3);
  }

  .option-btn.wrong {
    border-color: var(--accent2) !important;
    background: rgba(255,107,107,0.1) !important;
    color: var(--accent2);
  }

  .option-btn:disabled {
    cursor: default;
  }

  .option-letter {
    display: inline-block;
    width: 22px;
    height: 22px;
    background: var(--border);
    border-radius: 6px;
    text-align: center;
    line-height: 22px;
    font-size: 11px;
    font-weight: 700;
    margin-right: 8px;
    color: var(--muted);
  }

  /* Flashcard mode */
  .flashcard {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    cursor: pointer;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(.4,0,.2,1);
  }

  .flashcard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  .flashcard:active { transform: scale(0.99); }

  .flashcard .front {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: clamp(36px, 8vw, 56px);
    font-weight: 900;
    color: var(--text);
  }

  .flashcard .back {
    display: none;
  }

  .flashcard.flipped .front { display: none; }
  .flashcard.flipped .back {
    display: block;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent3);
  }

  .flashcard .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
  }

  .flashcard .cat-info {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .flashcard-actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }

  .fc-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.2s;
  }

  .fc-btn.know {
    background: rgba(107,255,184,0.15);
    color: var(--accent3);
    border: 1px solid rgba(107,255,184,0.3);
  }

  .fc-btn.know:hover { background: rgba(107,255,184,0.25); }

  .fc-btn.skip {
    background: rgba(255,107,107,0.12);
    color: var(--accent2);
    border: 1px solid rgba(255,107,107,0.25);
  }

  .fc-btn.skip:hover { background: rgba(255,107,107,0.22); }

  /* Result feedback */
  .feedback {
    padding: 16px 20px;
    border-radius: 14px;
    margin-top: 16px;
    font-size: 15px;
    font-weight: 600;
    display: none;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(107,255,184,0.1);
    border: 1px solid rgba(107,255,184,0.3);
    color: var(--accent3);
  }

  .feedback.wrong-fb {
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    color: var(--accent2);
  }

  /* Next button */
  .next-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 16px;
    transition: all 0.2s;
    display: none;
    letter-spacing: 0.3px;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { opacity: 0.88; transform: translateY(-2px); }

  /* Result screen */
  .result-screen {
    text-align: center;
    padding: 48px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    animation: slideIn 0.4s ease;
    display: none;
  }

  .result-screen.show { display: block; }

  .result-emoji {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .result-score {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 64px;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-msg {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .restart-btn {
    padding: 16px 40px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover { opacity: 0.85; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Responsive */
  @media (max-width: 480px) {
    .options-grid { grid-template-columns: 1fr; }
    .quiz-card { padding: 24px 18px; }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="badge">📚 N3 Vocabulary</span>
    <h1>Sou Matome<br>第2週</h1>
    <p class="subtitle">外出しましょう — Mari Keluar! • 162 Kosakata</p>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-value" id="scoreVal">0</span>
      <span class="stat-label">Benar</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="totalVal">0</span>
      <span class="stat-label">Dijawab</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="streakVal">0</span>
      <span class="stat-label">Streak 🔥</span>
    </div>
    <div class="stat">
      <span class="stat-value" id="remainVal">0</span>
      <span class="stat-label">Sisa</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="mode-wrap">
    <button class="mode-btn active" onclick="setMode('jp-to-id')">🇯🇵 → 🇮🇩</button>
    <button class="mode-btn" onclick="setMode('id-to-jp')">🇮🇩 → 🇯🇵</button>
    <button class="mode-btn" onclick="setMode('flashcard')">📇 Flashcard</button>
  </div>

  <div class="category-wrap" id="catWrap"></div>

  <div id="quizArea"></div>
  <div class="result-screen" id="resultScreen">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-score" id="resultScore"></div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="restart-btn" onclick="restart()">Ulangi Lagi 🔄</button>
  </div>
</div>

let mode = 'jp-to-id';
let currentCat = 'all';
let queue = [];
let current = 0;
let score = 0;
let answered = 0;
let streak = 0;
let fcFlipped = false;

const cats = ['all','1日目','2日目','3日目','4日目','5日目','6日目'];
const catLabels = { all:'Semua', '1日目':'1日目 📅', '2日目':'2日目 🚆①', '3日目':'3日目 🚆②', '4日目':'4日目 🚗①', '5日目':'5日目 🚗②', '6日目':'6日目 🏦' };

function init() {
  // Build category buttons
  const cw = document.getElementById('catWrap');
  cw.innerHTML = cats.map(c => `<button class="cat-btn ${c===currentCat?'active':''}" onclick="setCat('${c}')">${catLabels[c]}</button>`).join('');
  buildQueue();
  renderStats();
  render();
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i) => b.classList.toggle('active', ['jp-to-id','id-to-jp','flashcard'][i]===m));
  restart();
}

function setCat(c) {
  currentCat = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.textContent.startsWith(catLabels[c].split(' ')[0]) && c === b.textContent.replace(/[📅🚆①②🚗🏦]/g,'').trim() || (c==='all' && b.textContent==='Semua')));
  // simpler:
  document.querySelectorAll('.cat-btn').forEach((b,i) => b.classList.toggle('active', cats[i]===c));
  restart();
}

function buildQueue() {
  let pool = currentCat === 'all' ? [...vocab] : vocab.filter(v => v.cat === currentCat);
  queue = shuffle(pool);
  current = 0;
  score = 0;
  answered = 0;
  streak = 0;
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    let j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderStats() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('totalVal').textContent = answered;
  document.getElementById('streakVal').textContent = streak;
  document.getElementById('remainVal').textContent = Math.max(0, queue.length - current);
  const pct = queue.length ? (current / queue.length * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
}

function render() {
  const qa = document.getElementById('quizArea');
  const rs = document.getElementById('resultScreen');
  rs.classList.remove('show');
  qa.innerHTML = '';

  if (current >= queue.length) {
    showResult();
    return;
  }

  if (mode === 'flashcard') {
    renderFlashcard();
  } else {
    renderMCQ();
  }
}

function renderMCQ() {
  const item = queue[current];
  const qa = document.getElementById('quizArea');

  const question = mode === 'jp-to-id' ? item.jp : item.id;
  const sub = mode === 'jp-to-id' ? item.read : '';
  const answer = mode === 'jp-to-id' ? item.id : item.jp;

  // Generate 3 wrong answers from same or different category
  let pool = vocab.filter(v => v !== item);
  let wrongs = shuffle(pool).slice(0,3).map(v => mode === 'jp-to-id' ? v.id : v.jp);
  let options = shuffle([answer, ...wrongs]);
  const letters = ['A','B','C','D'];

  qa.innerHTML = `
    <div class="quiz-card">
      <div class="question-num">
        Soal ${current+1} / ${queue.length}
        <span class="cat-tag">${item.cat}</span>
      </div>
      <div class="question-main">${question}</div>
      ${sub ? `<div class="question-sub">${sub}</div>` : ''}
      <div class="options-grid" id="optGrid">
        ${options.map((opt,i) => `
          <button class="option-btn" onclick="checkAnswer(this,'${escStr(opt)}','${escStr(answer)}')" data-val="${escStr(opt)}">
            <span class="option-letter">${letters[i]}</span>${opt}
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()">Soal Berikutnya →</button>
    </div>
  `;
}

function escStr(s) {
  return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;');
}

function checkAnswer(btn, chosen, answer) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  const nb = document.getElementById('nextBtn');
  answered++;

  if (chosen === answer) {
    btn.classList.add('correct');
    fb.textContent = '✅ Benar! よくできました！';
    fb.className = 'feedback show correct-fb';
    score++;
    streak++;
  } else {
    btn.classList.add('wrong');
    // highlight correct
    btns.forEach(b => { if (b.dataset.val === answer) b.classList.add('correct'); });
    fb.textContent = `❌ Jawaban benar: ${answer}`;
    fb.className = 'feedback show wrong-fb';
    streak = 0;
  }
  nb.classList.add('show');
  renderStats();
}

function nextQ() {
  current++;
  renderStats();
  render();
}

function renderFlashcard() {
  const item = queue[current];
  const qa = document.getElementById('quizArea');
  fcFlipped = false;

  qa.innerHTML = `
    <div class="flashcard" id="fc" onclick="flipCard()">
      <div class="cat-info">${item.cat} • Tap untuk balik</div>
      <div class="front">${item.jp}</div>
      <div class="back">
        <div style="font-size:13px;color:var(--muted);margin-bottom:8px;">${item.read}</div>
        <div>${item.id}</div>
      </div>
      <div class="hint" id="fcHint">👆 Tap untuk lihat arti</div>
    </div>
    <div class="flashcard-actions" id="fcActions" style="display:none">
      <button class="fc-btn skip" onclick="fcAnswer(false)">✗ Belum hafal</button>
      <button class="fc-btn know" onclick="fcAnswer(true)">✓ Sudah hafal!</button>
    </div>
  `;
}

function flipCard() {
  if (fcFlipped) return;
  fcFlipped = true;
  document.getElementById('fc').classList.add('flipped');
  document.getElementById('fcHint').style.display = 'none';
  document.getElementById('fcActions').style.display = 'flex';
}

function fcAnswer(know) {
  answered++;
  if (know) { score++; streak++; } else { streak = 0; }
  current++;
  renderStats();
  render();
}

function showResult() {
  document.getElementById('quizArea').innerHTML = '';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');
  const pct = queue.length ? Math.round(score/answered*100) : 0;
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '📚';
  let msg = pct >= 90 ? 'Luar biasa! Kamu menguasai semua kosakata!' : pct >= 70 ? 'Bagus! Terus berlatih!' : pct >= 50 ? 'Cukup baik, masih ada yang perlu diulang.' : 'Jangan menyerah! Terus belajar ya!';
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = `${score}/${answered}`;
  document.getElementById('resultMsg').textContent = msg + ` (${pct}%)`;
}

function restart() {
  document.getElementById('resultScreen').classList.remove('show');
  buildQueue();
  renderStats();
  render();
}

init();
</script>
</body>
</html>
